services:
  vault-server:
    image: vault:1.13.3
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: 8274d2a1-c80c-ff56-c6ed-1b99f7bcea78
    # -dev-kv-v1: KV v1 at mount path "secret/" (not "kv-v1/")
    command: [ "server", "-dev-kv-v1", "-dev-listen-address", "0.0.0.0:8201"]
    cap_add:
      - IPC_LOCK
    ports:
      - 127.0.0.1:8201:8201
      
